<style data-layout-style="layout-logo">
  @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap");
  .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.35rem 0.8rem;
    gap: 0.8rem;
    border-radius: 9999px;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 0 12px rgba(0, 198, 255, 0.35), 0 0 18px rgba(168, 85, 247, 0.35);
  }

  .logo-text {
    font-family: "Nunito", "Manrope", "Inter", system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: 0.02em;
    font-size: 1.7rem;
    line-height: 1;
    background: linear-gradient(120deg, #00c6ff 0%, #58d0ff 25%, #a855f7 60%, #00c6ff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 10px rgba(0, 198, 255, 0.45), 0 0 24px rgba(168, 85, 247, 0.4);
    position: relative;
    animation: logoShimmer 3.5s ease-in-out infinite;
  }

  .logo-text-stack {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-tagline {
    margin-top: 0.3rem;
    font-family: "Inter", "Manrope", system-ui, sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: none;
    color: rgba(210, 232, 255, 0.75);
    text-shadow: 0 0 10px rgba(0, 198, 255, 0.18);
  }

  .logo-text::after {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.65) 50%, transparent 100%);
    opacity: 0.4;
    filter: blur(8px);
    mix-blend-mode: screen;
    transform: translateX(-120%);
    animation: logoSweep 4.5s ease-in-out infinite;
    pointer-events: none;
  }

  .logo-badge.logo-badge--footer {
    padding: 0.25rem 0.65rem;
    gap: 0.6rem;
  }

  .logo-badge.logo-badge--footer .logo-text {
    font-size: 1.28rem;
  }

  .logo-badge.logo-badge--footer .logo-icon {
    width: 34px;
    height: 34px;
    border-radius: 14px;
  }

  .logo-badge.logo-badge--footer .logo-tagline {
    font-size: 0.74rem;
  }

  .nav-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .nav-icon--active {
    animation: navPulse 2.2s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(0, 198, 255, 0.25));
  }

  @keyframes logoShimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes logoSweep {
    0% { transform: translateX(-140%); opacity: 0; }
    25% { opacity: 0.6; }
    50% { transform: translateX(140%); opacity: 0; }
    100% { transform: translateX(140%); opacity: 0; }
  }

  @keyframes navPulse {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-1px) scale(1.08); }
  }

  @media (prefers-reduced-motion: reduce) {
    .nav-icon--active {
      animation: none;
    }
  }
  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    overflow-x: visible;
  }

  main, .page, .app {
    width: 100%;
  }

  .max-w-screen-2xl,
  .max-w-screen-xl,
  .max-w-screen-lg,
  .max-w-7xl,
  .max-w-6xl,
  .max-w-5xl,
  .max-w-4xl,
  .max-w-3xl,
  .max-w-2xl,
  .max-w-xl,
  .max-w-lg,
  .max-w-md,
  .max-w-sm,
  .max-w-xs,
  .max-w-48xl {
    max-width: 100% !important;
  }

</style>
